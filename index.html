<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Arduino LED Calculator | Resistor Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input:focus { outline: 2px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-400">Arduino LED Resistor Tool</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Supply Voltage ($V_s$)</label>
                <input type="number" id="vs" value="5" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white">
                <p class="text-xs text-gray-400 mt-1">Common: 5V (Arduino) or 3.3V (ESP32)</p>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">LED Color (Presets)</label>
                <select id="preset" onchange="applyPreset()" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white">
                    <option value="custom">Custom</option>
                    <option value="2.0">Red / Yellow (approx 2.0V)</option>
                    <option value="3.2">Blue / White / Green (approx 3.2V)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Forward Voltage ($V_f$)</label>
                <input type="number" id="vf" value="2.0" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Target Current (mA)</label>
                <input type="number" id="current" value="20" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white">
            </div>

            <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition duration-200 mt-4 shadow-lg">
                Calculate Resistance
            </button>
        </div>

        <div id="resultBox" class="hidden mt-8 p-4 bg-gray-900 rounded-xl border-l-4 border-blue-500">
            <p class="text-sm text-gray-400">Required Resistor:</p>
            <h2 id="resistorVal" class="text-3xl font-bold text-white">-- ohms</h2>
            <p id="wattageWarning" class="text-xs mt-2 text-gray-400"></p>
        </div>
    </div>

    <script>
        function applyPreset() {
            const preset = document.getElementById('preset').value;
            if (preset !== 'custom') {
                document.getElementById('vf').value = preset;
            }
        }

        function calculate() {
            const vs = parseFloat(document.getElementById("vs").value);
            const vf = parseFloat(document.getElementById("vf").value);
            const ma = parseFloat(document.getElementById("current").value);
            const current = ma / 1000;

            if (vs <= vf) {
                alert("Supply voltage must be higher than LED Forward voltage!");
                return;
            }

            const r = (vs - vf) / current;
            const power = (vs - vf) * current;

            // Update UI
            document.getElementById("resultBox").classList.remove('hidden');
            document.getElementById("resistorVal").innerHTML = Math.round(r) + " Ω";
            
            let pText = `Power Dissipation: ${power.toFixed(3)}W. `;
            if (power > 0.25) {
                pText += "⚠️ Warning: Use a high-wattage resistor!";
                document.getElementById("resultBox").classList.replace('border-blue-500', 'border-red-500');
            } else {
                pText += "✅ Standard 1/4W resistor is safe.";
                document.getElementById("resultBox").classList.replace('border-red-500', 'border-blue-500');
            }
            document.getElementById("wattageWarning").innerText = pText;
        }
    </script>
</body>
</html>
